# Prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reload config
bind q source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Pane Controls
bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind x confirm-before -p "Kill pane? (y/n)" kill-pane

bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D

bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Down resize-pane -D 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5

# Swap panes
bind > swap-pane -D
bind < swap-pane -U

# Toggle zoom
bind z resize-pane -Z

# Window navigation
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind k kill-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n

bind -n M-Up switch-client -p
bind -n M-Down switch-client -n

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 100000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off
set -g display-time 2000
set -g display-panes-time 2000
set -g status-keys vi

# Status bar (bottom)
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 80
set -g window-status-separator ""

# Theme — matches Hyprland/Omarchy theme
set -g status-style "bg=#2c2525,fg=#e6d9db"
set -g status-left "#[fg=#2c2525,bg=#f38d70,bold] #S #[bg=#2c2525] "
set -g status-right "#{?client_prefix,#[fg=#f9cc6c,bold] PREFIX #[default],}#[fg=#948a8b]%H:%M #[fg=#72696a]| #[fg=#e6d9db]#h "
set -g window-status-format "#[fg=#948a8b] #I #W "
set -g window-status-current-format "#[fg=#2c2525,bg=#f38d70,bold] #I #W #[default]"
set -g pane-border-style "fg=#403e41"
set -g pane-active-border-style "fg=#f38d70"
set -g message-style "bg=#2c2525,fg=#f38d70"
set -g message-command-style "bg=#2c2525,fg=#f38d70"
set -g mode-style "bg=#f38d70,fg=#2c2525"
set -g popup-border-style "fg=#403e41"
setw -g clock-mode-colour "#f38d70"
